<!DOCTYPE html>
<html lang="ru">
    <head>
        <meta charset="utf-8" name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Генератор фактов о кошках</title>
        <script src="script.js"></script>
    </head>
    <body>
        <main class="screen">
            <h1>Генератор фактов о кошках</h1>
            <div class="buttons">
                <button id="get-fact">Получить интересный факт о кошках!</button>
                <button id="get-list-facts">Получить список фактов о кошках!</button>
            </div>
            <div class="result" id="fact">
                <h2>Случайный факт</h2>
                <div class="fact-text">Нажмите кнопку, чтобы получить факт</div>
            </div>
            <div class="result" id="list-facts">
            <h2>Список фактов</h2>
            <div>Нажмите кнопку, чтобы получить список</div>
            </div>
        </main>
    </body>
</html>
